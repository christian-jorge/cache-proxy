services:
  anthropic-cache-proxy:
    build: .
    container_name: anthropic-cache-proxy
    restart: unless-stopped
```

Depois no Coolify, nas configurações do serviço, muda o **Build Pack** de "Dockerfile" para "Docker Compose" e define o arquivo como `docker-compose.yml`.

Após o redeploy, a URL interna fica fixa para sempre:
```
http://anthropic-cache-proxy:8080
